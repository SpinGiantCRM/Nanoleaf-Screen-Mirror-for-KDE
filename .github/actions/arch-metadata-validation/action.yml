name: Arch metadata validation
description: Install Arch packaging dependencies and validate PKGBUILD metadata via makepkg as a non-root user
runs:
  using: composite
  steps:
    - name: Install packaging dependencies
      shell: bash
      run: |
        # Refresh keyring first to avoid intermittent signature failures from stale base images.
        pacman -Sy --noconfirm --needed archlinux-keyring
        for attempt in 1 2 3; do
          if pacman -Syu --noconfirm --needed base-devel git; then
            break
          fi
          if [ "${attempt}" -eq 3 ]; then
            exit 1
          fi
          echo "pacman install failed (attempt ${attempt}); retrying in 10s..."
          sleep 10
        done

    - name: Validate Arch package metadata
      shell: bash
      run: |
        useradd -m builder
        chown -R builder:builder "$GITHUB_WORKSPACE"
        cd "$GITHUB_WORKSPACE/packaging/arch"
        bash -n nanoleaf-kde-sync.install
        # Arch packaging requires makepkg to run as a non-root user.
        su - builder -c "cd \"$GITHUB_WORKSPACE/packaging/arch\" && makepkg --printsrcinfo >/dev/null"
