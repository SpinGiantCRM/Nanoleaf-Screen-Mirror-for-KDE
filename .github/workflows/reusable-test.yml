name: Reusable test runner

on:
  workflow_call:
    inputs:
      target:
        description: Target environment variant
        required: true
        type: string
      test-label:
        description: Human-friendly label for the pytest step
        required: true
        type: string
      pytest-args:
        description: Arguments passed to pytest
        required: false
        default: -q
        type: string

jobs:
  run-tests:
    runs-on: ubuntu-latest
    container: ${{ inputs.target == 'arch' && 'archlinux:latest' || null }}
    steps:
      - name: Install runtime dependencies
        if: ${{ inputs.target == 'arch' }}
        run: |
          pacman -Syu --noconfirm --needed python python-pip python-setuptools git

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        if: ${{ inputs.target == 'ubuntu' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        if: ${{ inputs.target == 'arch' }}
        run: python -m venv .venv

      - name: Install dependencies (Ubuntu)
        if: ${{ inputs.target == 'ubuntu' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Install dependencies (Arch)
        if: ${{ inputs.target == 'arch' }}
        run: |
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Run ${{ inputs.test-label }}
        run: |
          if [ "${{ inputs.target }}" = "arch" ]; then
            . .venv/bin/activate
          fi
          pytest ${{ inputs.pytest-args }}
