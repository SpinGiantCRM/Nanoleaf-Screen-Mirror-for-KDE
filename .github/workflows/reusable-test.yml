name: Reusable test runner

on:
  workflow_call:
    inputs:
      target:
        description: Target environment variant
        required: true
        type: string
      test-label:
        description: Human-friendly label for the pytest step
        required: true
        type: string
      pytest-args:
        description: Arguments passed to pytest
        required: false
        default: -q
        type: string
      install-runtime-deps:
        description: Install app runtime/UI/device dependencies in addition to baseline test deps
        required: false
        default: true
        type: boolean

jobs:
  run-tests:
    runs-on: ubuntu-latest
    container: ${{ inputs.target == 'arch' && 'archlinux:latest' || null }}
    steps:
      - name: Prepare debug artifacts directory
        run: mkdir -p .github-debug

      - name: Install runtime dependencies
        if: ${{ inputs.target == 'arch' }}
        run: |
          set -o pipefail
          # Refresh keyring first to avoid intermittent signature failures from stale base images.
          pacman -Sy --noconfirm --needed archlinux-keyring
          # Keep Python toolchain packages here so pip installs are reliable on Arch.
          for attempt in 1 2 3; do
            if pacman -Syu --noconfirm --needed \
              python python-pip python-setuptools python-wheel python-virtualenv \
              base-devel libffi openssl git; then
              break
            fi
            if [ "${attempt}" -eq 3 ]; then
              exit 1
            fi
            echo "pacman install failed (attempt ${attempt}); retrying in 10s..."
            sleep 10
          done |& tee .github-debug/runtime-dependencies.log

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        if: ${{ inputs.target == 'ubuntu' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create virtual environment
        if: ${{ inputs.target == 'arch' }}
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          set -o pipefail
          if [ "${{ inputs.target }}" = "arch" ]; then
            . .venv/bin/activate
          fi
          {
            python -m pip install --upgrade pip
            # Baseline CI lanes should only pull test dependencies.
            pip install -r docs/requirements-test.txt
            if [ "${{ inputs.install-runtime-deps }}" = "true" ]; then
              # Runtime deps are opt-in for integration-heavy test slices.
              pip install -r docs/requirements.txt
            fi
            pip install -e . --no-deps
          } |& tee .github-debug/install-dependencies.log

      - name: "Diagnostics: Python and pip versions"
        run: |
          if [ "${{ inputs.target }}" = "arch" ]; then
            . .venv/bin/activate
          fi
          {
            python --version
            python -m pip --version
            pip --version
          } | tee .github-debug/python-pip-versions.txt

      - name: "Diagnostics: Installed package list"
        run: |
          if [ "${{ inputs.target }}" = "arch" ]; then
            . .venv/bin/activate
          fi
          pip list | tee .github-debug/pip-list.txt

      - name: "Diagnostics: Environment info"
        run: |
          {
            echo "target=${{ inputs.target }}"
            echo "runner_os=${{ runner.os }}"
            if [ "${{ inputs.target }}" = "arch" ]; then
              echo "container=enabled"
            else
              echo "container=disabled"
            fi
            echo "uname=$(uname -a)"
            [ -f /etc/os-release ] && cat /etc/os-release
            [ -f /.dockerenv ] && echo "dockerenv=true" || echo "dockerenv=false"
            [ -f /run/.containerenv ] && echo "containerenv=true" || echo "containerenv=false"
          } | tee .github-debug/environment-info.txt

      - name: Run ${{ inputs.test-label }}
        run: |
          set -o pipefail
          if [ "${{ inputs.target }}" = "arch" ]; then
            . .venv/bin/activate
          fi
          pytest ${{ inputs.pytest-args }} |& tee .github-debug/pytest-output.txt

      - name: Upload diagnostics artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: debug-${{ inputs.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            .github-debug/pytest-output.txt
            .github-debug/install-dependencies.log
            .github-debug/runtime-dependencies.log
            .github-debug/python-pip-versions.txt
            .github-debug/pip-list.txt
            .github-debug/environment-info.txt
