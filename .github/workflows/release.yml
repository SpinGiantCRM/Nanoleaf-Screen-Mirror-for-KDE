name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build (format: vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libc6-dev libegl1 libgl1 libxkbcommon0

      - name: Validate canonical version sources
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#refs/tags/}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Release tag must be in format vX.Y.Z; got '${RELEASE_TAG}'." >&2
            exit 1
          fi
          printf '%s\n' "${RELEASE_VERSION}" > VERSION
          python scripts/check_release_versions.py --tag "${RELEASE_TAG}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Validate Arch package metadata
        run: |
          set -euo pipefail
          bash -n packaging/arch/nanoleaf-kde-sync.install
          if command -v pacman >/dev/null 2>&1; then
            useradd -m builder 2>/dev/null || true
            chown -R builder:builder "$GITHUB_WORKSPACE"
            cd packaging/arch
            su - builder -c "cd \"$GITHUB_WORKSPACE/packaging/arch\" && makepkg --printsrcinfo >/dev/null"
          else
            echo "pacman unavailable on this runner; validated install script only."
          fi

      - name: Build DRM helper binary
        run: bash scripts/build_drm_helper.sh

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel
          python -m build --wheel
          python -m build --sdist
          python scripts/validate_wheel.py dist/*-linux_x86_64.whl

      - name: Release-candidate artifact checklist
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set -uo pipefail
          mkdir -p release-assets

          python -m pip install --upgrade pip
          pip install --force-reinstall dist/*-linux_x86_64.whl

          # Mock capture + default Nanoleaf VID/PID for CI-safe smoke-test output.
          nanoleaf-kde-sync-init-config --mode diagnostic --force

          doctor_rc=0
          smoke_rc=0
          bundle_rc=0
          verify_rc=0

          set +e
          nanoleaf-kde-sync-doctor > release-assets/rc-doctor.txt 2>&1
          doctor_rc=$?

          nanoleaf-kde-sync-smoke-test > release-assets/rc-smoke-test.txt 2>&1
          smoke_rc=$?

          nanoleaf-kde-sync-doctor --bundle release-assets/rc-diagnostic-bundle.zip \
            > release-assets/rc-diagnostic-bundle.log 2>&1
          bundle_rc=$?

          python scripts/verify_runtime_install.py > release-assets/rc-runtime-verify.txt 2>&1
          verify_rc=$?
          set -e

          {
            echo "Release candidate checklist (ubuntu-latest, offline/CI-safe)"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Version: ${RELEASE_VERSION}"
            echo "QT_QPA_PLATFORM=${QT_QPA_PLATFORM}"
            echo ""
            echo "Artifacts:"
            echo "  rc-doctor.txt"
            echo "  rc-smoke-test.txt"
            echo "  rc-diagnostic-bundle.zip"
            echo "  rc-diagnostic-bundle.log"
            echo "  rc-runtime-verify.txt"
            echo ""
            echo "Exit codes (non-zero is expected on GitHub-hosted runners without KDE/HID):"
            echo "  doctor: ${doctor_rc}"
            echo "  smoke-test: ${smoke_rc}"
            echo "  diagnostic-bundle: ${bundle_rc}"
            echo "  runtime-verify: ${verify_rc}"
          } > release-assets/rc-checklist-summary.txt

      - name: Build source archive
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Use tracked files from the working tree (not git archive from HEAD)
          # so the temporary VERSION update applied above is reflected in the
          # release source tarball.
          git ls-files -z \
            | tar --null -T - -czf "release-assets/Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_VERSION}.tar.gz" \
                --transform "s|^|Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_VERSION}/|"

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp -f dist/* release-assets/

      - name: Validate release artifact versions
        run: |
          set -euo pipefail
          python scripts/check_release_versions.py --artifact-dir dist --artifact-dir release-assets

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          for artifact in *; do
            sha256sum "${artifact}" > "${artifact}.sha256"
          done

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@v1.12.4
