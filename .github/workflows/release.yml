name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release artifacts exist
        run: |
          test -f nanoleaf-kde-sync.AppImage
          test -f install-nanoleaf-kde-sync.sh

      - name: Publish GitHub release with AppImage and installer
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nanoleaf-kde-sync.AppImage
            install-nanoleaf-kde-sync.sh
          generate_release_notes: true
          draft: false
          prerelease: false
