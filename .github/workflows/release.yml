name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build (format: vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  sync-version:
    name: Sync VERSION on default branch
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync VERSION to published release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#refs/tags/}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Release tag must be in format vX.Y.Z; got '${RELEASE_TAG}'." >&2
            exit 1
          fi
          printf '%s\n' "${RELEASE_VERSION}" > VERSION
          if git diff --quiet -- VERSION; then
            echo "VERSION already aligned for ${RELEASE_VERSION}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: sync VERSION to ${RELEASE_VERSION} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"

  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate canonical version sources
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#refs/tags/}"
          RELEASE_VERSION="${RELEASE_VERSION#v}"
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Release tag must be in format vX.Y.Z; got '${RELEASE_TAG}'." >&2
            exit 1
          fi
          printf '%s\n' "${RELEASE_VERSION}" > VERSION
          python scripts/check_release_versions.py --tag "${RELEASE_TAG}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Validate Arch package metadata
        run: |
          set -euo pipefail
          bash -n packaging/arch/nanoleaf-kde-sync.install
          if command -v pacman >/dev/null 2>&1; then
            useradd -m builder 2>/dev/null || true
            chown -R builder:builder "$GITHUB_WORKSPACE"
            cd packaging/arch
            su - builder -c "cd \"$GITHUB_WORKSPACE/packaging/arch\" && makepkg --printsrcinfo >/dev/null"
          else
            echo "pacman unavailable on this runner; validated install script only."
          fi

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Build source archive
        run: |
          set -euo pipefail
          mkdir -p release-assets
          # Use tracked files from the working tree (not git archive from HEAD)
          # so the temporary VERSION update applied above is reflected in the
          # release source tarball.
          git ls-files -z \
            | tar --null -T - -czf "release-assets/Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_VERSION}.tar.gz" \
                --transform "s|^|Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_VERSION}/|"

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp -f dist/* release-assets/

      - name: Validate release artifact versions
        run: |
          set -euo pipefail
          python scripts/check_release_versions.py --artifact-dir dist --artifact-dir release-assets

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          for artifact in *; do
            sha256sum "${artifact}" > "${artifact}.sha256"
          done

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
