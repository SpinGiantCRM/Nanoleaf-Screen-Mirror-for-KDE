name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Build source archive
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          git archive --format=tar.gz --prefix="Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_TAG}/" -o "release-assets/Nanoleaf-Screen-Mirror-for-KDE-${RELEASE_TAG}.tar.gz" HEAD

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          cp -f dist/* release-assets/

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          for artifact in *; do
            sha256sum "${artifact}" > "${artifact}.sha256"
          done

      - name: Upload assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
