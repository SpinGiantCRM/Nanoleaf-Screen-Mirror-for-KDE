name: Quarterly Calibration QA Sweep

on:
  schedule:
    - cron: "0 12 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  open-quarterly-qa-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Open quarterly calibration QA sweep issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const now = new Date();
            const quarter = Math.floor(now.getUTCMonth() / 3) + 1;
            const title = `Quarterly Calibration QA Sweep (${now.getUTCFullYear()}-Q${quarter})`;
            const bodyTemplate = fs.readFileSync('.github/ISSUE_TEMPLATE/quarterly_calibration_qa_sweep.md', 'utf8');
            const body = bodyTemplate
              .replace('Quarterly Calibration QA Sweep (YYYY-Q#)', `Quarterly Calibration QA Sweep (${now.getUTCFullYear()}-Q${quarter})`)
              .replace(/`YYYY-Q#`/g, `\`${now.getUTCFullYear()}-Q${quarter}\``);

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            if (issues.some((issue) => issue.title === title)) {
              core.info(`Issue already open: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['qa', 'calibration', 'maintenance'],
            });
