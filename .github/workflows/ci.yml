name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-metadata-validation:
    name: Release metadata validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            python3 ./scripts/sync_release_version.py --git-tag "${GITHUB_REF_NAME}"
            python3 ./scripts/validate_release_metadata.py --git-tag "${GITHUB_REF_NAME}"
          else
            python3 ./scripts/validate_release_metadata.py
          fi

  unit-integration-tests:
    needs: release-metadata-validation
    name: Unit and integration tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Run unit and integration tests
        run: pytest -q

  unit-integration-tests-arch:
    needs: release-metadata-validation
    name: Unit and integration tests (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install runtime dependencies
        run: |
          pacman -Syu --noconfirm --needed python python-pip python-setuptools git

      - name: Checkout
        uses: actions/checkout@v5

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Run unit and integration tests
        run: |
          . .venv/bin/activate
          pytest -q

  release-install-regression-tests:
    needs: release-metadata-validation
    name: Release/install regression tests (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Run release/install regression tests
        run: pytest -q tests/test_release_install_regressions.py tests/test_release_assets.py

  release-install-regression-tests-arch:
    needs: release-metadata-validation
    name: Release/install regression tests (Arch Linux)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install runtime dependencies
        run: |
          pacman -Syu --noconfirm --needed python python-pip python-setuptools git

      - name: Checkout
        uses: actions/checkout@v5

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .[test]

      - name: Run release/install regression tests
        run: |
          . .venv/bin/activate
          pytest -q tests/test_release_install_regressions.py tests/test_release_assets.py

  arch-package-metadata-sanity:
    needs: release-metadata-validation
    name: Arch package metadata sanity
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Arch package metadata
        uses: ./.github/actions/arch-metadata-validation
