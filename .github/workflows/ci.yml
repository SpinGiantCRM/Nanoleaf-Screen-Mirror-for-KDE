name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-metadata-validation:
    name: Release metadata validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            python3 ./scripts/sync_release_version.py --git-tag "${GITHUB_REF_NAME}"
            python3 ./scripts/validate_release_metadata.py --git-tag "${GITHUB_REF_NAME}"
          else
            python3 ./scripts/validate_release_metadata.py
          fi

  common-ci-gates:
    name: Common CI gates
    needs: release-metadata-validation
    uses: ./.github/workflows/reusable-ci-gates.yml
