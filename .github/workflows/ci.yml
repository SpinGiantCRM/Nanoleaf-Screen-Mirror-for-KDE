name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: CI (py${{ matrix.python-version }})
    # Intentional: ubuntu-latest validates packaging-agnostic Python behavior;
    # KDE/Wayland integration checks are covered manually in release RC matrix.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep CI tooling explicit so lint/type/test commands remain available,
          # even if optional extras resolution changes across pip/setuptools versions.
          pip install -e .[test] pytest-cov ruff mypy

      - name: Validate version metadata
        run: python scripts/check_release_versions.py

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/nanoleaf_sync --ignore-missing-imports --follow-imports=silent

      - name: Calibration guardrails
        if: github.event_name == 'pull_request'
        run: python scripts/check_calibration_guardrails.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Run tests
        run: pytest -q --timeout=60 --timeout-method=thread --durations=25 --cov=nanoleaf_sync --cov-report=term-missing --cov-fail-under=70

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml
      - name: Run pip-audit
        run: pip-audit --path .

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
          audit_on: push
          generate_sarif: true
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
