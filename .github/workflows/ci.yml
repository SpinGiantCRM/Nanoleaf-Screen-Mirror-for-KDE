name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: CI (py${{ matrix.python-version }})
    # Intentional: ubuntu-latest validates packaging-agnostic Python behavior;
    # KDE/Wayland integration checks are covered manually in release RC matrix.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep CI tooling explicit so lint/type/test commands remain available,
          # even if optional extras resolution changes across pip/setuptools versions.
          pip install -e .[test] pytest-cov ruff mypy

      - name: Validate version metadata
        run: python scripts/check_release_versions.py

      - name: Lint
        run: ruff check src/ tests/ --select E9,F63,F7,F82

      - name: Type check
        # Staged mypy adoption: this initial scope targets CLI/tooling modules first.
        run: mypy src/nanoleaf_sync/tools/config_init.py src/nanoleaf_sync/tools/output_format.py --ignore-missing-imports --follow-imports=silent

      - name: Run tests
        run: pytest -q --cov=nanoleaf_sync --cov-report=term-missing --cov-fail-under=60
