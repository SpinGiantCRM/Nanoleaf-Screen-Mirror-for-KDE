name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Validate Arch package metadata
        run: |
          cd packaging/arch
          bash -n nanoleaf-kde-sync.install
          makepkg --printsrcinfo > /dev/null
