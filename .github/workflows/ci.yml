name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-metadata-validation:
    name: Release metadata validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate release metadata
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            python3 ./scripts/sync_release_version.py --git-tag "${GITHUB_REF_NAME}"
            python3 ./scripts/validate_release_metadata.py --git-tag "${GITHUB_REF_NAME}"
          else
            python3 ./scripts/validate_release_metadata.py
          fi

  unit-integration-tests-ubuntu:
    needs: release-metadata-validation
    name: Unit and integration tests / Ubuntu
    uses: ./.github/workflows/reusable-test.yml
    with:
      target: ubuntu
      test-label: unit and integration tests
      pytest-args: -q

  unit-integration-tests-arch:
    needs: release-metadata-validation
    name: Unit and integration tests / Arch Linux
    uses: ./.github/workflows/reusable-test.yml
    with:
      target: arch
      test-label: unit and integration tests
      pytest-args: -q

  release-install-regression-tests-ubuntu:
    needs: release-metadata-validation
    name: Release/install regression tests / Ubuntu
    uses: ./.github/workflows/reusable-test.yml
    with:
      target: ubuntu
      test-label: release/install regression tests
      pytest-args: -q tests/test_release_install_regressions.py tests/test_release_assets.py
      # Keep this lane free of runtime GUI/device dependencies unless tests need them.
      install-runtime-deps: false

  release-install-regression-tests-arch:
    needs: release-metadata-validation
    name: Release/install regression tests / Arch Linux
    uses: ./.github/workflows/reusable-test.yml
    with:
      target: arch
      test-label: release/install regression tests
      pytest-args: -q tests/test_release_install_regressions.py tests/test_release_assets.py
      # Keep this lane free of runtime GUI/device dependencies unless tests need them.
      install-runtime-deps: false

  arch-package-metadata-sanity:
    needs: release-metadata-validation
    name: Arch package metadata sanity
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Arch package metadata
        uses: ./.github/actions/arch-metadata-validation
