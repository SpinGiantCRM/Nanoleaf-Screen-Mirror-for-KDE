name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: CI (py${{ matrix.python-version }})
    # Keep this job intentionally aligned with .github/workflows/ci-weekly.yml;
    # weekly CI adds dependency audit coverage for drift detection.
    # Intentional: ubuntu-latest validates packaging-agnostic Python behavior;
    # KDE/Wayland integration checks are covered manually in release RC matrix.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    timeout-minutes: 30
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep CI tooling explicit so lint/type/test commands remain available,
          # even if optional extras resolution changes across pip/setuptools versions.
          pip install -e .[test] pytest-cov ruff mypy

      - name: Validate version metadata
        run: python scripts/check_release_versions.py

      - name: Validate runtime install
        run: python scripts/verify_runtime_install.py

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Format check
        run: ruff format --check src/ tests/ scripts/

      - name: Type check
        run: mypy src/nanoleaf_sync --ignore-missing-imports --follow-imports=silent

      - name: Calibration guardrails
        if: github.event_name == 'pull_request'
        run: python scripts/check_calibration_guardrails.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.sha }}"

      - name: Run tests
        run: pytest -q --timeout=60 --timeout-method=thread --durations=25 --cov=nanoleaf_sync --cov-report=term-missing --cov-fail-under=75

  benchmark:
    name: Performance baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run benchmark and compare baseline
        run: |
          nanoleaf-kde-sync-benchmark --preset production --json perf/result.json --compare perf/baseline.json

  wheel-contents-audit:
    name: Wheel contents audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc libc6-dev

      - name: Build DRM helper binary
        run: bash scripts/build_drm_helper.sh

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install build wheel
          python -m build --wheel

      - name: Validate wheel contents
        run: python scripts/validate_wheel.py dist/*-linux_x86_64.whl

  arch-metadata:
    name: Arch package metadata
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Arch package metadata
        uses: ./.github/actions/arch-metadata-validation

  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml
      - name: Run pip-audit
        run: pip-audit --path .

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/python
          audit_on: push
          generate_sarif: true
      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
