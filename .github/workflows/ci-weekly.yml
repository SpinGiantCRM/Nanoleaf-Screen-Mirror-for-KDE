name: Weekly CI

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  weekly:
    name: Weekly CI (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test] pytest-cov ruff mypy pip-audit
      - name: Version checks
        run: python scripts/check_release_versions.py
      - name: Lint
        run: ruff check src/ tests/ --select E9,F63,F7,F82
      - name: Type check
        run: mypy src/nanoleaf_sync --ignore-missing-imports --follow-imports=silent
      - name: pip audit
        run: pip-audit
        continue-on-error: true
      - name: Tests
        run: pytest -q --timeout=60 --timeout-method=thread --durations=25 --cov=nanoleaf_sync --cov-report=term-missing --cov-fail-under=70
