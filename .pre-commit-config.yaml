repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/|tests/)
      - id: ruff-format
        files: ^(src/|tests/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --follow-imports=silent, --no-strict-optional]
        additional_dependencies: [types-PyYAML, types-requests]
        files: ^src/nanoleaf_sync/
        pass_filenames: true
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: ghostcheck
        name: ghostcheck
        description: Check for hallucinated imports
        entry: "python3 -c \"import ast, sys; files = [f for f in sys.argv[1:] if f.endswith('.py')]; [print(f'WARNING: ghostcheck not installed -- skipping {f}') for f in files]\""
        language: system
        files: \.py$
        verbose: true
