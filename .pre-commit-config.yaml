repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.14
    hooks:
      - id: ruff
        args: [check, --select, "E9,F63,F7,F82"]
        files: ^(src/|tests/)
      - id: ruff-format
        files: ^(src/|tests/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        args:
          - --ignore-missing-imports
          - --follow-imports=silent
        files: ^src/nanoleaf_sync/
        additional_dependencies:
          - numpy>=1.21
          - PyQt6>=6.0
          - dbus-next>=0.2.0
          - hidapi>=0.14.0
          - dacite>=1.8.1
          - tomli-w>=1.0.0
