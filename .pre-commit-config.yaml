repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src/|tests/)
      - id: ruff-format
        files: ^(src/|tests/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --follow-imports=silent]
        additional_dependencies: [types-PyYAML, types-requests, numpy, PyQt6, dacite, hidapi]
        files: ^src/nanoleaf_sync/
        pass_filenames: false
        entry: mypy src/nanoleaf_sync
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: bandit -r src/ -c pyproject.toml
        language: system
        pass_filenames: false
        files: ^src/
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
